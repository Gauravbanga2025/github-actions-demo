# This is workflow name
name: Hello

# runs on a trigger
on: 
  push:
    branches: [main]


# these are jobs inside the workflow
jobs: 

   # this is the name of the job
   greet:
     # this is the github runner, each job runs on a runner
      runs-on: ubuntu-latest
      steps: 
       - name: say hello to users
         run : echo "Hello"
        
       - name: say hello 
         run : echo "Hello $users"
